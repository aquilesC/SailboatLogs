{% extends "base.html" %}

{% block title %}Add Log Entry — {{ trip.title }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-8">
  <nav class="text-sm text-text-secondary mb-4">
    <a href="{% url 'trip_detail' pk=trip.pk %}" class="hover:text-brand-secondary">&larr; Back to {{ trip.title }}</a>
  </nav>

  <h1>Add Log Entry</h1>

  <form id="log-entry-form" method="post" enctype="multipart/form-data" class="card space-y-6">
    {% csrf_token %}
    
    <div>
      <label for="id_entry_text" class="form-label">Log Text</label>
      <textarea name="entry_text" id="id_entry_text" rows="4" class="form-input" placeholder="What's happening?"></textarea>
    </div>

    <div>
      <label for="id_photos" class="form-label">Photos (resized automatically)</label>
      <input type="file" id="id_photos" multiple accept="image/*" class="form-input">
      <p class="text-xs text-text-secondary mt-1">Photos will be resized to a maximum of 1920px on the longest edge before uploading to save bandwidth.</p>
    </div>

    <!-- Preview area for selected photos -->
    <div id="photo-preview-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mt-4 hidden">
    </div>

    <div class="pt-4 flex items-center gap-4">
      <button type="submit" id="submit-btn" class="btn-primary w-full sm:w-auto">
        <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Upload Log Entry
      </button>
      <p id="upload-status" class="text-sm text-status-info hidden font-medium"></p>
    </div>
  </form>
</div>

<script>
  const MAX_IMAGE_SIZE = 1920;
  const form = document.getElementById('log-entry-form');
  const fileInput = document.getElementById('id_photos');
  const previewContainer = document.getElementById('photo-preview-container');
  const submitBtn = document.getElementById('submit-btn');
  const uploadStatus = document.getElementById('upload-status');
  
  let processedFiles = [];

  fileInput.addEventListener('change', async (e) => {
    previewContainer.innerHTML = '';
    processedFiles = [];
    
    if (e.target.files.length > 0) {
      previewContainer.classList.remove('hidden');
    } else {
      previewContainer.classList.add('hidden');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = 'Processing images...';

    for (let i = 0; i < e.target.files.length; i++) {
      const file = e.target.files[i];
      if (!file.type.startsWith('image/')) continue;
      
      try {
        const resizedBlob = await resizeImage(file, MAX_IMAGE_SIZE);
        // Create a new File object from the blob, using original name
        // Use a unique name just in case multiple files have the same name
        const safeName = i + "_" + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
        const resizedFile = new File([resizedBlob], safeName, {
          type: 'image/jpeg',
          lastModified: file.lastModified
        });
        
        // Store both the file and its original lastModified timestamp
        processedFiles.push({
          file: resizedFile,
          takenAt: file.lastModified
        });

        // Add a small preview
        const reader = new FileReader();
        reader.onload = (re) => {
          const img = document.createElement('img');
          img.src = re.target.result;
          img.className = 'w-full h-24 object-cover rounded-lg shadow-sm border border-gray-200';
          previewContainer.appendChild(img);
        };
        reader.readAsDataURL(resizedBlob);
      } catch (error) {
        console.error("Error processing image", error);
      }
    }

    submitBtn.disabled = false;
    submitBtn.innerHTML = `<svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Upload Log Entry`;
  });

  function resizeImage(file, maxSize) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      
      img.onload = () => {
        URL.revokeObjectURL(url);
        let width = img.width;
        let height = img.height;
        
        if (width > height) {
          if (width > maxSize) {
            height = Math.round((height * maxSize) / width);
            width = maxSize;
          }
        } else {
          if (height > maxSize) {
            width = Math.round((width * maxSize) / height);
            height = maxSize;
          }
        }
        
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // Convert to JPEG with 0.85 quality
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error('Canvas to Blob failed'));
        }, 'image/jpeg', 0.85);
      };
      
      img.onerror = reject;
      img.src = url;
    });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Check if at least text or photos exist
    const entryText = form.querySelector('[name=entry_text]').value.trim();
    if (!entryText && processedFiles.length === 0) {
      alert("Please enter some text or select at least one photo.");
      return;
    }

    submitBtn.disabled = true;
    uploadStatus.classList.remove('hidden', 'text-status-danger');
    uploadStatus.classList.add('text-status-info');
    uploadStatus.textContent = 'Uploading...';

    const formData = new FormData();
    formData.append('csrfmiddlewaretoken', form.querySelector('[name=csrfmiddlewaretoken]').value);
    formData.append('entry_text', entryText);
    
    for (const item of processedFiles) {
      formData.append('photos', item.file);
      // Append explicit timestamp because EXIF is stripped
      formData.append(`taken_at_${item.file.name}`, item.takenAt);
    }

    try {
      const response = await fetch(window.location.href, {
        method: 'POST',
        body: formData,
        headers: {
          'X-Requested-With': 'XMLHttpRequest'
        }
      });
      
      if (response.redirected) {
        window.location.href = response.url;
      } else if (response.ok) {
        // Fallback manual redirect if fetch didn't follow redirect automatically
        window.location.href = "{% url 'trip_detail' pk=trip.pk %}";
      } else {
        uploadStatus.textContent = 'Upload failed. Please try again.';
        submitBtn.disabled = false;
        uploadStatus.classList.replace('text-status-info', 'text-status-danger');
      }
    } catch (err) {
      console.error('Upload error:', err);
      uploadStatus.textContent = 'Network error during upload.';
      submitBtn.disabled = false;
      uploadStatus.classList.replace('text-status-info', 'text-status-danger');
    }
  });
</script>
{% endblock %}
